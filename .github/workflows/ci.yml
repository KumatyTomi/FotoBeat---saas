name: FotoBeat CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint, test and build frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Check formatting
        run: npx prettier --check .

      - name: Run unit tests
        run: npm test

      - name: Type check
        run: npm run typecheck

      - name: Lint code
        run: npm run lint

      - name: Build app
        run: npm run build
